<!DOCTYPE html>
<html lang="en">
<head>
 
  <title>Laiba's Birthday Bash</title>


  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Pacifico&family=Germania+One&family=Poppins:wght@500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: url('2.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
    }

    .invitation {
      text-align: center;
      width: 440px;
      padding: 2rem;
    }

    /* Title - Bigger and new font */
    .title {
      font-family: 'Great Vibes', cursive;
      font-size: 3.5rem;
      font-weight: 700;
      color: #2d0d32;
      margin-bottom: 2rem;
      letter-spacing: 1px;
    }

    /* Single invitation box */
    .invite-box {
      background: #f3bba2;
      padding: 2rem 1.5rem;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    /* You're Invited - back to previous font */
    .invited {
      font-family: 'Pacifico', cursive;
      font-size: 2.2rem;
      color: #4b2a38;
      margin-bottom: 1.5rem;
    }

    /* Date, Time, Location - Germania One */
    .invite-box p {
      font-family: 'Germania One', cursive;
      font-size: 1.2rem;
      margin: 0.7rem 0;
      color: #844964;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    /* Venue button */
    .venue-btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.9rem 2rem;
      background: #9e5c7d;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      border-radius: 30px;
      font-size: 1rem;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .venue-btn:hover {
      background: #7f3d5e;
     
    }
  </style>
</head>
<body>
  <div class="invitation">
    <h1 class="title">Armish's Birthday Bash</h1>

    <div class="invite-box">
      <h2 class="invited">You're Invited!</h2>
      <p><strong>Date:</strong> Saturday, October 11th, 2025</p>
      <p><strong>Time:</strong> 3:00 PM – 7:00 PM</p>
      <p><strong>Location:</strong> H#1, St#1, Sector A</p>
    </div>

    <a href="https://www.google.com/maps/place/SEECS+UG+Block/@33.6422224,72.9877165,17z/data=!3m1!4b1!4m6!3m5!1s0x38df972812b99c3b:0xef60183cceeb48c5!8m2!3d33.6422224!4d72.9902914!16s%2Fg%2F11l6x9kqrx?entry=ttu&g_ep=EgoyMDI1MTAwMS4wIKXMDSoASAFQAw%3D%3D" class="venue-btn" target="_blank">Venue Location</a>
  </div>
</body>
</html>
